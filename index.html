<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESEN – Actividades Extracurriculares</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body>

  <!-- ── LOGIN ─────────────────────────────────────────── -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon"><i class="ti ti-school"></i></div>
        <div>
          <div class="login-logo-text">ESEN</div>
          <div class="login-logo-sub">Actividades Extracurriculares</div>
        </div>
      </div>
      <h1 class="login-title">Iniciar sesión</h1>
      <p class="login-sub">Ingrese sus credenciales para continuar</p>

      <div class="role-tabs">
        <button class="role-tab active" data-role="admin">
          <i class="ti ti-shield-check"></i> Administrador
        </button>
        <button class="role-tab" data-role="student">
          <i class="ti ti-user"></i> Estudiante
        </button>
      </div>

      <div class="field-group">
        <label class="field-label" for="login-user">Usuario</label>
        <input class="field-input" type="text" id="login-user" placeholder="Ingrese su usuario" value="admin" />
      </div>
      <div class="field-group">
        <label class="field-label" for="login-pass">Contraseña</label>
        <input class="field-input" type="password" id="login-pass" placeholder="Ingrese su contraseña" value="1234" />
      </div>
      <p class="login-error" id="login-error"></p>
      <button class="btn-primary" id="btn-login">
        <i class="ti ti-login"></i> Ingresar al sistema
      </button>
    </div>
  </div>

  <!-- ── APP SHELL ──────────────────────────────────────── -->
  <div id="main-app" class="app-shell hidden">

    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-icon"><i class="ti ti-school"></i></div>
        <span class="topbar-title">Sistema de Actividades Extracurriculares</span>
      </div>
      <div class="topbar-right">
        <span id="role-badge" class="role-badge"></span>
        <span id="user-name" class="user-name"></span>
        <button class="btn-logout" id="btn-logout">
          <i class="ti ti-logout"></i> Salir
        </button>
      </div>
    </header>

    <div class="layout">
      <nav class="sidebar" id="sidebar"></nav>
      <main class="main" id="content"></main>
    </div>
  </div>

  <!-- ── MODAL CONTAINER ───────────────────────────────── -->
  <div id="modal-container"></div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/actividades.js"></script>
  <script src="js/estudiantes.js"></script>
  <script src="js/reportes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
